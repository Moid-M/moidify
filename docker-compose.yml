services:
  moidify:
    build: .
    container_name: moidify
    restart: unless-stopped
    ports:
      - "${MOIDIFY_PORT:-8000}:8000"
    volumes:
      - ./music:/app/music
      - ./data:/app/data
      - ./covers:/app/covers
    environment:
      - MOIDIFY_MUSIC_DIR=/app/music
      - MOIDIFY_COVERS_DIR=/app/covers
      - MOIDIFY_DB_PATH=/app/data/music.db
      - MOIDIFY_PORT=8000
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/home')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
