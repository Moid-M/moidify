<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moidify</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="drag-handle" id="sidebar-drag"></div>
      <div class="logo">Moidify</div>

      <div class="search-box">
        <input type="text" id="search" data-i18n="search.placeholder" placeholder="Search tracks, artists, albums..." autocomplete="off">
      </div>

      <div id="pinned-section" class="pinned-section" style="display:none"></div>

      <nav class="nav-section">
        <a class="nav-item" data-view="tracks" data-i18n="nav.tracks">All Tracks</a>
        <a class="nav-item active" data-view="albums" data-i18n="nav.albums">Albums</a>
        <a class="nav-item" data-view="artists" data-i18n="nav.artists">Artists</a>
        <a class="nav-item" data-view="genres" data-i18n="nav.genres">Genres</a>
        <a class="nav-item" data-view="favorites" id="fav-nav" style="display:none" data-i18n="nav.favorites">Liked Songs</a>
      </nav>

      <div class="nav-section playlists-section">
        <div class="section-header">
          <span data-i18n="nav.playlists">Your Playlists</span>
          <div style="display:flex;gap:4px;align-items:center;">
            <button id="new-playlist-folder-btn" title="New Folder" style="background:none;border:none;color:var(--text-secondary);font-size:14px;cursor:pointer;padding:0 4px;line-height:1;">📁</button>
            <button id="new-playlist-btn" title="New Playlist" data-i18n-title="playlist.new">+</button>
            <button id="import-playlist-btn" title="Import playlist">↑</button>
          </div>
        </div>
        <div id="playlist-list"></div>
      </div>
    </aside>

    <div id="main-area">
      <header id="top-bar">
        <div class="top-bar-left">
          <button id="settings-btn" class="icon-btn" title="Settings">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
        <div class="top-bar-right" id="top-auth">
          <div id="auth-logged-out">
            <button id="login-btn" class="top-auth-btn" data-i18n="auth.login">Log In</button>
            <button id="register-btn" class="top-auth-btn" data-i18n="auth.register">Register</button>
          </div>
          <div id="auth-logged-in" style="display:none">
            <span id="user-display" class="top-username"></span>
            <button id="logout-btn" class="top-auth-btn" data-i18n="auth.logout">Log Out</button>
          </div>
        </div>
      </header>

      <main id="content"></main>
    </div>

    <aside id="queue-panel" class="queue-panel" style="display:none">
      <div class="drag-handle" id="queue-drag"></div>
      <div class="queue-header">
        <span data-i18n="player.queue">Queue</span>
        <button id="close-queue-btn" class="icon-btn" title="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="queue-now-playing">
        <div id="queue-cover-wrap" class="queue-cover-wrap"><img id="queue-cover" src="/static/placeholder-cover.svg" alt=""></div>
        <div class="queue-now-info">
          <span id="queue-title" class="queue-now-title"></span>
          <span id="queue-artist" class="queue-now-artist"></span>
        </div>
        <div class="queue-mini-progress">
          <input type="range" id="queue-seek" min="0" max="100" value="0">
          <div class="queue-mini-times">
            <span id="queue-current-time">0:00</span>
            <span id="queue-total-time">0:00</span>
          </div>
        </div>
      </div>
      <div class="queue-divider">
        <span data-i18n="tracks.addQueue">Next up</span>
        <span id="queue-count"></span>
      </div>
      <div id="queue-list"></div>
      <div id="sleep-timer-section" class="queue-section" style="display:none">
        <div class="queue-divider">
          <span>Sleep Timer</span>
          <span id="sleep-timer-display"></span>
        </div>
        <div class="queue-mini-progress" style="padding:0 8px;">
          <input type="range" id="sleep-timer-progress" min="0" max="100" value="0">
          <div class="queue-mini-times" style="padding:0;">
            <span id="sleep-timer-label"></span>
            <button id="sleep-timer-cancel" class="sleep-cancel-btn">Cancel</button>
          </div>
        </div>
      </div>
      <button id="clear-queue-btn" class="queue-clear-btn">Clear queue</button>
    </aside>

    <footer id="player-bar">
      <div class="player-seek-bar">
        <span id="current-time">0:00</span>
        <div class="seek-wrap">
          <div class="seek-wave" id="seek-wave"></div>
          <div class="seek-dot" id="seek-dot"></div>
          <input type="range" id="seek" min="0" max="100" value="0">
        </div>
        <span id="total-time">0:00</span>
      </div>
      <div class="player-body">
          <div class="player-left">
            <div class="player-cover-wrap" style="position:relative;flex-shrink:0;">
              <img id="player-cover" src="/static/placeholder-cover.svg" alt="">
              <button id="player-cover-expand" class="cover-expand-btn" title="Full-screen art">⛶</button>
            </div>
            <div class="player-eq eq-anim" style="display:none"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="player-track-meta">
              <span id="player-title"></span>
              <span id="player-artist"></span>
            </div>
          </div>
        <div class="player-center">
          <div class="player-controls">
            <button id="shuffle-btn" class="ctrl-btn" title="Shuffle" data-i18n-title="player.shuffle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm0 16l2.04-2.04L4 5.41 5.41 4 17.96 16.54 20 14.5V20h-5.5z"/></svg>
            </button>
            <button id="prev-btn" class="ctrl-btn" title="Previous" data-i18n-title="player.previous">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="19,20 9,12 19,4"/><polygon points="5,4 5,20 7,20 7,4"/></svg>
            </button>
            <button id="rewind-btn" class="ctrl-btn" title="-10 seconds" data-i18n-title="player.rewind">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="12,20 2,12 12,4"/><text x="12" y="10" text-anchor="middle" font-size="6" fill="currentColor" font-weight="bold">10</text></svg>
            </button>
            <button id="play-btn" class="play-btn" title="Play" data-i18n-title="player.play">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>
            </button>
            <button id="forward-btn" class="ctrl-btn" title="+10 seconds" data-i18n-title="player.forward">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="12,4 22,12 12,20"/><text x="12" y="10" text-anchor="middle" font-size="6" fill="currentColor" font-weight="bold">10</text></svg>
            </button>
            <button id="next-btn" class="ctrl-btn" title="Next" data-i18n-title="player.next">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="5,20 15,12 5,4"/><polygon points="17,4 17,20 19,20 19,4"/></svg>
            </button>
            <button id="repeat-btn" class="ctrl-btn" title="Repeat: Off" data-i18n-title="player.repeat_off">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
            <button id="speed-btn" class="ctrl-btn" title="Playback Speed" style="font-size:11px;font-weight:600;letter-spacing:0.5px;min-width:32px;">1x</button>
          </div>
        </div>
        <div class="player-right">
          <div class="volume-wrap">
            <button id="volume-btn" class="ctrl-btn" title="Mute" data-i18n-title="player.mute">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            </button>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
          </div>
          <button id="eq-btn" class="ctrl-btn" title="Equalizer" data-i18n-title="player.eq">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
          </button>
          <button id="lyrics-btn" class="ctrl-btn" title="Lyrics" data-i18n-title="player.lyrics">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </button>
        <button id="queue-toggle-btn" class="ctrl-btn" title="Queue" data-i18n-title="player.queue">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.5"/><circle cx="4" cy="12" r="1.5"/><circle cx="4" cy="18" r="1.5"/></svg>
            <span id="queue-badge" class="badge" style="display:none">0</span>
          </button>
          <button id="mini-player-btn" class="ctrl-btn" title="Mini Player" style="position:relative;">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
        </div>
      </div>
    </footer>

    <div id="selection-bar">
      <span class="sel-count" data-i18n="tracks.selected">0 selected</span>
      <div class="sel-actions">
        <button class="btn-primary" data-sel="play" data-i18n="tracks.playAll">Play All</button>
        <button class="btn-primary" data-sel="queue" data-i18n="tracks.addQueue">Add to Queue</button>
        <button class="btn-primary" data-sel="playlist" data-i18n="tracks.addPlaylist">Add to Playlist</button>
        <button class="btn-primary" data-sel="download" data-i18n="tracks.download">Download</button>
        <button class="sel-clear-btn" data-sel="clear" data-i18n="tracks.clear">Clear</button>
      </div>
    </div>
  </div> <!-- /app -->

  <div id="modal-overlay" style="display:none">
    <div id="modal">
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="context-menu" class="context-menu" style="display:none"></div>

  <div id="toast-container"></div>

  <div id="mini-player" style="display:none">
    <div id="mini-player-body">
      <img id="mini-cover" src="/static/placeholder-cover.svg" alt="">
      <div id="mini-meta">
        <span id="mini-title"></span>
        <span id="mini-artist"></span>
      </div>
      <div id="mini-controls">
        <button id="mini-play" class="ctrl-btn" title="Play"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg></button>
        <button id="mini-next" class="ctrl-btn" title="Next"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="5,20 15,12 5,4"/><polygon points="17,4 17,20 19,20 19,4"/></svg></button>
      </div>
      <button id="mini-close" class="ctrl-btn" title="Close">&times;</button>
    </div>
  </div>

  <div id="fs-art" style="display:none"><img id="fs-art-img"><button id="fs-art-close">&times;</button></div>

  <div id="backdrop"></div>

  <div id="nowplaying-overlay" style="display:none">
    <div id="nowplaying-panel">
      <div class="nowplaying-header">
        <button id="close-np-btn" class="icon-btn" title="Close"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="nowplaying-body">
        <div id="np-art-section">
          <img id="np-cover" src="/static/placeholder-cover.svg" alt="">
          <div id="np-info">
            <span id="np-title"></span>
            <span id="np-artist"></span>
          </div>
          <div id="np-controls">
            <button id="np-prev" class="ctrl-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="19,20 9,12 19,4"/><polygon points="5,4 5,20 7,20 7,4"/></svg></button>
            <button id="np-play" class="ctrl-btn" style="width:56px;height:56px;font-size:28px;"><svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg></button>
            <button id="np-next" class="ctrl-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><polygon points="5,20 15,12 5,4"/><polygon points="17,4 17,20 19,20 19,4"/></svg></button>
          </div>
          <div id="np-progress-wrap">
            <input type="range" id="np-seek" min="0" max="100" value="0" class="seek-bar">
            <div class="np-times">
              <span id="np-current-time">0:00</span>
              <span id="np-total-time">0:00</span>
            </div>
          </div>
        </div>
        <div id="np-lyrics-section">
          <div id="np-lyrics-content" class="lyrics-content"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="eq-overlay" style="display:none">
    <div id="eq-panel">
      <div class="eq-panel-header">
        <span style="font-size:18px;font-weight:700;">Equalizer</span>
        <button id="close-eq-btn" class="icon-btn" title="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="eq-preset-strip" class="eq-presets" style="margin-bottom:12px;"></div>
      <div id="eq-band-grid" class="eq-grid" style="margin-bottom:16px;"></div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <span style="font-size:12px;color:var(--text-muted);min-width:55px;">Crossfade</span>
        <input type="range" id="eq-crossfade" min="0" max="12" step="1" value="0" style="flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--bg-hover);border-radius:2px;outline:none;">
        <span id="eq-crossfade-label" style="font-size:12px;color:var(--text-muted);min-width:20px;">0s</span>
      </div>
      <canvas id="eq-visualizer" width="540" height="120" style="width:100%;height:120px;border-radius:8px;background:var(--bg);"></canvas>
    </div>
  </div>

  <div id="lyrics-overlay" style="display:none">
    <div id="lyrics-panel">
      <div class="lyrics-header">
        <div class="lyrics-meta">
          <span id="lyrics-title"></span>
          <span id="lyrics-artist"></span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button id="viz-toggle-btn" class="icon-btn" title="Show visualizer">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="10" width="3" height="8" rx="1"/><rect x="9" y="4" width="3" height="16" rx="1"/><rect x="15" y="7" width="3" height="10" rx="1"/><rect x="21" y="9" width="3" height="6" rx="1"/></svg>
          </button>
          <button id="close-lyrics-btn" class="icon-btn" title="Close">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div id="lyrics-body" style="display:flex;gap:16px;">
        <div id="lyrics-content" style="flex:1;min-width:0;">
          <div class="lyrics-placeholder">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <p>Loading lyrics...</p>
          </div>
        </div>
        <canvas id="lyrics-visualizer" width="200" height="400" style="display:none;width:200px;height:auto;border-radius:8px;background:var(--bg);flex-shrink:0;align-self:stretch;"></canvas>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>

  <script>
  fetch('/api/setup/status').then(function(r) { return r.json(); }).then(function(d) {
    if (d.setup_needed) { window.location.href = '/setup'; }
  }).catch(function(){});
  </script>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/icons.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/player.js"></script>
  <script src="/static/js/queue.js"></script>
  <script src="/static/js/lyrics.js"></script>
  <script src="/static/js/animations.js"></script>
  <script src="/static/js/ui.js"></script>
  <script src="/static/js/views.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
